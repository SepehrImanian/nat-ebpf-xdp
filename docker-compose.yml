# eBPF programs load into the HOST kernel, so privileged + host network are required.
# Usage:
#   docker compose up nat
#   docker compose up -d nat
#   docker compose run nat --conns
#   docker compose run nat --stats

x-nat-base: &nat-base
  build:
    context: .
    dockerfile: Dockerfile
  image: nat-ebpf-xdp:latest
  network_mode: host
  privileged: true
  volumes:
    - /sys/fs/bpf:/sys/fs/bpf
    - /proc:/proc:ro

services:

  nat:
    <<: *nat-base
    container_name: xdp-nat
    restart: unless-stopped
    command:
      - --interface
      - "${IFACE:-eth0}"
      - --network
      - "${INT_NETWORK:-192.168.1.0/24}"
      - --external-ip
      - "${EXT_IP:-203.0.113.1}"
      - --port-start
      - "${PORT_START:-10000}"
      - --port-end
      - "${PORT_END:-20000}"
      - --tcp-timeout
      - "${TCP_TIMEOUT:-7440}"
      - --udp-timeout
      - "${UDP_TIMEOUT:-300}"
      - --daemon
    environment:
      - IFACE=${IFACE:-eth0}
      - INT_NETWORK=${INT_NETWORK:-192.168.1.0/24}
      - EXT_IP=${EXT_IP:-203.0.113.1}

  monitor:
    <<: *nat-base
    container_name: xdp-nat-monitor
    profiles: [monitor]
    command:
      - --interface
      - "${IFACE:-eth0}"
      - --network
      - "${INT_NETWORK:-192.168.1.0/24}"
      - --external-ip
      - "${EXT_IP:-203.0.113.1}"
      - --log-events
      - --monitor

  stats:
    <<: *nat-base
    container_name: xdp-nat-stats
    profiles: [stats]
    restart: "no"
    command:
      - --interface
      - "${IFACE:-eth0}"
      - --stats
      - --json
