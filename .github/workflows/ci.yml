name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev \
            linux-headers-$(uname -r) \
            libelf-dev zlib1g-dev

      - name: Build kernel eBPF object
        run: make xdp_nat_kern.o

      - name: Build userspace control tool
        run: make xdp_nat_user

      - name: Verify BPF object is valid ELF
        run: |
          file xdp_nat_kern.o
          llvm-objdump -h xdp_nat_kern.o

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nat-ebpf-xdp-${{ github.sha }}
          path: |
            xdp_nat_kern.o
            xdp_nat_user
          retention-days: 7

  lint:
    name: Lint (clang-tidy)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang clang-tidy libbpf-dev libelf-dev zlib1g-dev

      - name: Run clang-tidy on userspace source
        run: |
          # Userspace source only needs libbpf headers — do NOT pass kernel
          # headers here; mixing them with glibc causes typedef conflicts.
          # cert-err33-c  : requires (void) cast on every fprintf — too noisy
          # cert-err34-c  : atoi vs strtol — cosmetic for a CLI tool
          # bugprone-easily-swappable-parameters : false-positive heavy
          clang-tidy xdp_nat_user.c \
            --checks='-*,clang-analyzer-*,bugprone-narrowing-conversions,bugprone-integer-division,bugprone-branch-clone,bugprone-suspicious-string-compare,bugprone-use-after-move' \
            -- -I/usr/include -O2 -Wall 2>&1 | tee tidy.log
          ! grep -q "error:" tidy.log

  docker-build:
    name: Docker build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: nat-ebpf-xdp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release binaries
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, lint]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev \
            linux-headers-$(uname -r) \
            libelf-dev zlib1g-dev

      - name: Build release artifacts
        run: |
          make
          tar -czf nat-ebpf-xdp-linux-x86_64.tar.gz \
            xdp_nat_kern.o xdp_nat_user README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: nat-ebpf-xdp-linux-x86_64.tar.gz
          generate_release_notes: true
